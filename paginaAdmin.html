<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neymar's Parking</title>
       <!-- Bootstrap CSS -->
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
       <link rel="stylesheet" href="styles.css">
       <!-- Icons -->
       <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
       <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
           <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="container d-none">
        <h1 class="my-4">Painel do Administrador </h1>
        <div class="mb-4">
            <h2>Definir o valor do Estacionamento            </h2>
            <input type="number" class="form-control w-50" id="tariff" placeholder="Digite a nova tarifa">
            <button class="btn btn-success mt-2" onclick="updateTariff()">Atualizar tarifa</button>
        </div>
        <h2 class="mt-4">Gerar relatório diário</h2>
        <button class="btn btn-secondary" onclick="generateReport('json')">Baixar relatório JSON </button>
        <button class="btn btn-secondary" onclick="generateReport('xml')">Baixar relatório XML </button>
    </div>
      
          <script type="module" src="index.js"></script>
          <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
      
</body>
</html>
